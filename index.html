<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มแจ้งลางาน</title>
  <style>
    body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f6f9; margin: 0; }
    .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { text-align: center; color: #333; }
    label { font-weight: bold; margin-top: 10px; display: block; color: #555; font-size: 14px;}
    select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background-color: white;}
    button { width: 100%; padding: 12px; background-color: #00B900; color: white; border: none; border-radius: 5px; font-size: 16px; margin-top: 20px; cursor: pointer; font-weight: bold;}
    #profile { text-align: center; margin-bottom: 20px; font-size: 16px;}
    .optional { color: #888; font-weight: normal; font-size: 12px;}
  </style>
</head>
<body>
  <div class="container">
    <h2>ฟอร์มแจ้งลางาน</h2>
    <div id="profile">กำลังโหลดข้อมูล...</div>

    <form id="leaveForm">
      <label>ประเภทการลา:</label>
      <select id="leaveType"><option value="ลาป่วย">ลาป่วย</option><option value="ลากิจส่วนตัว">ลากิจส่วนตัว</option></select>
      
      <label>วันที่ลา:</label>
      <input type="date" id="leaveDate">
      
      <label>ช่วงเวลาการลา:</label>
      <select id="leavePeriod">
        <option value="เต็มวัน">เต็มวัน (1 วัน)</option>
        <option value="ครึ่งวันเช้า">ครึ่งวันเช้า (0.5 วัน)</option>
        <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย (0.5 วัน)</option>
      </select>

      <label>เหตุผล <span class="optional">(ไม่บังคับ)</span>:</label>
      <textarea id="reason" rows="2" placeholder="ใส่เหตุผล (ถ้ามี)"></textarea>

      <label>แนบรูปภาพ / ใบรับรองแพทย์ <span class="optional">(ไม่บังคับ)</span>:</label>
      <input type="file" id="uploadFile" accept="image/*">

      <button type="button" id="submitBtn" onclick="submitForm()">ส่งคำขอ</button>
    </form>
  </div>

    <script>
    var userId = "", empName = "";
    
    // ⚠️ 1. เอาลิงก์ Web App URL (ที่ลงท้ายด้วย /exec) มาใส่ตรงนี้ครับ
    var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz6q2ARcSOCNZBKqRz9EJIzr5unptMiqgVXkQyjCj4JT8WnFqR1mHmL7s_hXtVECi9T/exec"; 

    // 🌟 2. ใช้ระบบ LIFF ดึงชื่ออัตโนมัติ (ไม่ต้องรอลิงก์จากบอท)
    async function main() {
      try {
        await liff.init({ liffId: "2009828487-hcLEuF0g" }); 

        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          userId = profile.userId;
          empName = profile.displayName;
          document.getElementById("profile").innerHTML = "ผู้ขอลา: <b style='color:#00B900;'>" + empName + "</b>";
        } else {
          liff.login();
        }
      } catch (err) {
        document.getElementById("profile").innerHTML = "<b style='color:red;'>พังตอนเชื่อมต่อ: " + err.message + "</b>";
      }
    }
    
    main();

    function submitForm() {
      var t = document.getElementById("leaveType").value;
      var d = document.getElementById("leaveDate").value;
      var p = document.getElementById("leavePeriod").value;
      var r = document.getElementById("reason").value || "-"; 
      var fileInput = document.getElementById("uploadFile").files[0];
      
      if(!d || !p) return alert("กรุณากรอกวันที่ให้ครบถ้วน");

      var days = (p === "เต็มวัน") ? 1 : 0.5;

      document.getElementById("submitBtn").innerText = "กำลังประมวลผล...";
      document.getElementById("submitBtn").disabled = true;

      // ถ้ามีการแนบรูป ให้แปลงรูปก่อน
      if (fileInput) {
        document.getElementById("submitBtn").innerText = "กำลังอัปโหลดรูปภาพ...";
        var reader = new FileReader();
        reader.onload = function(e) {
          var base64Data = e.target.result.split(',')[1];
          sendToGoogle(t, d, p, days, r, base64Data, fileInput.name, fileInput.type);
        };
        reader.readAsDataURL(fileInput);
      } else {
        // ถ้าไม่มีรูป ส่งปกติ
        sendToGoogle(t, d, p, days, r, "", "", "");
      }
    }

    function sendToGoogle(t, d, p, days, r, base64Data, fileName, mimeType) {
      document.getElementById("submitBtn").innerText = "กำลังส่งข้อมูล...";
      
      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ 
          action: "api_request", userId: userId, empName: empName, leaveType: t, leaveDate: d, leavePeriod: p, leaveDays: days, reason: r,
          fileBase64: base64Data, fileName: fileName, mimeType: mimeType
        })
      })
      .then(response => response.text())
      .then(result => {
        if(result === "unregistered") {
          alert("❌ คุณยังไม่ได้ลงทะเบียนพนักงาน!");
        } else if(result === "success") {
          document.body.innerHTML = "<div style='text-align:center; padding: 40px;'><h1 style='color:#00B900;'>✅ ส่งคำขอสำเร็จ!</h1><p>ระบบบันทึกข้อมูลเรียบร้อยแล้ว<br><br><b style='color:#555;'>กดกากบาท (X) มุมขวาบนเพื่อปิดหน้านี้ได้เลยครับ</b></p></div>";
        } else {
          alert("เกิดข้อผิดพลาด: " + result);
          document.getElementById("submitBtn").innerText = "ส่งคำขอ";
          document.getElementById("submitBtn").disabled = false;
        }
      }).catch(err => alert("ส่งไม่สำเร็จ: " + err));
    }
  </script>
</body>
</html>
