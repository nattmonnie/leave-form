<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มแจ้งลางาน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f6f9; margin: 0; }
    .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { text-align: center; color: #333; }
    label { font-weight: bold; margin-top: 10px; display: block; color: #555; }
    select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background-color: #00B900; color: white; border: none; border-radius: 5px; font-size: 16px; margin-top: 20px; cursor: pointer; font-weight: bold;}
    #profile { text-align: center; margin-bottom: 20px; font-size: 16px; color: #0056b3;}
  </style>
</head>
<body>
  <div class="container">
    <h2>ฟอร์มแจ้งลางาน</h2>
    <div id="profile">กำลังเชื่อมต่อบัญชี...</div>

    <form id="leaveForm">
      <label>ประเภทการลา:</label>
      <select id="leaveType">
        <option value="ลาป่วย">ลาป่วย</option>
        <option value="ลากิจส่วนตัว">ลากิจส่วนตัว</option>
      </select>
      
      <label>วันที่ลา:</label>
      <input type="date" id="leaveDate">
      
      <!-- 🌟 เปลี่ยนมาใช้ Dropdown เลือกช่วงเวลาแทน -->
      <label>ช่วงเวลาการลา:</label>
      <select id="leavePeriod">
        <option value="เต็มวัน">เต็มวัน (1 วัน)</option>
        <option value="ครึ่งวันเช้า">ครึ่งวันเช้า (0.5 วัน)</option>
        <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย (0.5 วัน)</option>
      </select>

      <label>เหตุผล:</label><textarea id="reason" rows="3"></textarea>
      <button type="button" id="submitBtn" onclick="submitForm()">ส่งคำขอ</button>
    </form>
  </div>

   <script>
    var userId = "", empName = "";
    var WEB_APP_URL = "เดี๋ยวค่อยมาใส่ทีหลังครับ"; // ปล่อยทิ้งไว้ก่อน ขอแค่ดึงชื่อให้ได้ก่อน

    async function main() {
      var statusDiv = document.getElementById("profile");
      statusDiv.innerHTML = "สเต็ป 1: กำลังเริ่มเชื่อมต่อ LIFF...";

      try {
        await liff.init({ liffId: "2009828487-hcLEuF0g" });
        statusDiv.innerHTML = "สเต็ป 2: เชื่อมต่อสำเร็จ! กำลังเช็คสถานะ...";

        if (liff.isLoggedIn()) {
          statusDiv.innerHTML = "สเต็ป 3: ล็อกอินแล้ว! กำลังดึงชื่อ...";
          const profile = await liff.getProfile();
          userId = profile.userId;
          empName = profile.displayName;
          statusDiv.innerHTML = "ผู้ขอลา: <b style='color:#00B900;'>" + empName + "</b>";
        } else {
          statusDiv.innerHTML = "สเต็ป 4: ยังไม่ล็อกอิน กำลังสั่งเข้าสู่ระบบ...";
          liff.login();
        }
      } catch (err) {
        statusDiv.innerHTML = "<b style='color:red;'>พังตอนเชื่อมต่อ: " + err.message + "</b>";
      }
    }
    
    // สั่งให้เริ่มทำงานทันที
    main();

    function submitForm() {
      alert("ตอนนี้เรากำลังทดสอบดึงชื่ออยู่นะครับ ปุ่มส่งข้อมูลยังไม่เปิดใช้งาน");
    }
  </script>
</body>
</html>
