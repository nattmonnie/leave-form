<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มแจ้งลางาน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f6f9; margin: 0; }
    .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { text-align: center; color: #333; }
    label { font-weight: bold; margin-top: 10px; display: block; color: #555; }
    select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background-color: #00B900; color: white; border: none; border-radius: 5px; font-size: 16px; margin-top: 20px; cursor: pointer; font-weight: bold;}
    #profile { text-align: center; margin-bottom: 20px; font-size: 16px; color: #0056b3;}
  </style>
</head>
<body>
  <div class="container">
    <h2>ฟอร์มแจ้งลางาน</h2>
    <div id="profile">กำลังเชื่อมต่อบัญชี...</div>

    <form id="leaveForm">
      <label>ประเภทการลา:</label>
      <select id="leaveType">
        <option value="ลาป่วย">ลาป่วย</option>
        <option value="ลากิจส่วนตัว">ลากิจส่วนตัว</option>
      </select>
      
      <label>วันที่ลา:</label>
      <input type="date" id="leaveDate">
      
      <!-- 🌟 เปลี่ยนมาใช้ Dropdown เลือกช่วงเวลาแทน -->
      <label>ช่วงเวลาการลา:</label>
      <select id="leavePeriod">
        <option value="เต็มวัน">เต็มวัน (1 วัน)</option>
        <option value="ครึ่งวันเช้า">ครึ่งวันเช้า (0.5 วัน)</option>
        <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย (0.5 วัน)</option>
      </select>

      <label>เหตุผล:</label><textarea id="reason" rows="3"></textarea>
      <button type="button" id="submitBtn" onclick="submitForm()">ส่งคำขอ</button>
    </form>
  </div>

  <script>
    var userId = "", empName = "";
    var WEB_APP_URL = "ใส่_WEB_APP_URL_ของคุณตรงนี้"; // ⚠️ แปะ Web App URL
    
    async function main() {
      await liff.init({ liffId: "ใส่_LIFF_ID_ตรงนี้" });  // ⚠️ แปะ LIFF ID
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userId = profile.userId; empName = profile.displayName;
        document.getElementById("profile").innerHTML = "LINE: <b style='color:#00B900;'>" + empName + "</b>";
      } else { liff.login(); }
    }
    main();

    function submitForm() {
      var t = document.getElementById("leaveType").value;
      var d = document.getElementById("leaveDate").value;
      var p = document.getElementById("leavePeriod").value;
      var r = document.getElementById("reason").value;
      
      if(!d || !p || !r) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

      // แปลงข้อความช่วงเวลา ให้กลายเป็นตัวเลขเพื่อเอาไปคำนวณรวมใน Sheet
      var days = (p === "เต็มวัน") ? 1 : 0.5;

      document.getElementById("submitBtn").innerText = "กำลังส่งข้อมูล...";
      document.getElementById("submitBtn").disabled = true;

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "api_request", userId: userId, empName: empName, leaveType: t, leaveDate: d, leavePeriod: p, leaveDays: days, reason: r })
      })
      .then(response => response.text())
      .then(result => {
        if(result === "unregistered") {
          alert("❌ คุณยังไม่ได้ลงทะเบียนพนักงาน!\nกรุณากดเมนู 'ลงทะเบียน' ในแชทก่อนครับ");
          liff.closeWindow();
        } else if(result === "success") {
          document.body.innerHTML = "<div style='text-align:center; padding: 40px;'><h1 style='color:#00B900;'>✅ สำเร็จ!</h1><p>กรุณารอรับข้อความยืนยันในแชท</p></div>";
          setTimeout(function() { liff.closeWindow(); }, 1500); 
        }
      });
    }
  </script>
</body>
</html>
